<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1a2e"/>
      <stop offset="100%" stop-color="#0f2d4a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Header du site -->
  <rect x="0" y="0" width="800" height="64" fill="rgba(3,105,161,0.9)"/>
  <text x="40" y="38" font-family="sans-serif" font-size="20" font-weight="800" fill="white">Dupont Plomberie</text>
  <text x="40" y="54" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" letter-spacing="1">PLOMBIER — MULHOUSE &amp; RÉGION</text>
  <rect x="600" y="18" width="160" height="32" rx="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="680" y="38" font-family="sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">03 89 XX XX XX</text>

  <!-- Hero section -->
  <rect x="40" y="90" width="380" height="220" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(2,132,199,0.2)" stroke-width="1"/>

  <!-- Icône clé/outil -->
  <circle cx="100" cy="160" r="30" fill="rgba(2,132,199,0.2)" stroke="rgba(2,132,199,0.4)" stroke-width="1.5"/>
  <text x="100" y="168" font-family="sans-serif" font-size="22" text-anchor="middle">🔧</text>

  <rect x="148" y="143" width="200" height="12" rx="6" fill="rgba(255,255,255,0.15)"/>
  <rect x="148" y="163" width="160" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="148" y="179" width="180" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>

  <!-- Badges services -->
  <rect x="60" y="210" width="90" height="28" rx="6" fill="rgba(2,132,199,0.15)" stroke="rgba(2,132,199,0.3)" stroke-width="1"/>
  <text x="105" y="229" font-family="sans-serif" font-size="10" fill="#38bdf8" text-anchor="middle">Urgence 24h</text>
  <rect x="162" y="210" width="90" height="28" rx="6" fill="rgba(2,132,199,0.1)" stroke="rgba(2,132,199,0.2)" stroke-width="1"/>
  <text x="207" y="229" font-family="sans-serif" font-size="10" fill="#7dd3fc" text-anchor="middle">Devis gratuit</text>
  <rect x="264" y="210" width="90" height="28" rx="6" fill="rgba(2,132,199,0.1)" stroke="rgba(2,132,199,0.2)" stroke-width="1"/>
  <text x="309" y="229" font-family="sans-serif" font-size="10" fill="#7dd3fc" text-anchor="middle">Garantie 2 ans</text>

