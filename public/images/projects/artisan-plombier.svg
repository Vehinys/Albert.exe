  <rect x="60" y="260" width="180" height="38" rx="8" fill="url(#blue)"/>
  <text x="150" y="284" font-family="sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">Demander un devis</text>

  <!-- Formulaire de devis -->
  <rect x="450" y="90" width="320" height="300" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(2,132,199,0.2)" stroke-width="1"/>
  <text x="610" y="118" font-family="sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">Devis en ligne</text>

  <rect x="470" y="130" width="280" height="1" fill="rgba(2,132,199,0.2)"/>

  <rect x="470" y="145" width="280" height="34" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="484" y="166" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.25)">Votre nom</text>

  <rect x="470" y="190" width="280" height="34" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="484" y="211" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.25)">Votre téléphone</text>

  <rect x="470" y="235" width="280" height="34" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="484" y="256" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.25)">Type d'intervention</text>

  <rect x="470" y="280" width="280" height="70" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="484" y="301" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.25)">Description du problème...</text>

  <rect x="470" y="363" width="280" height="38" rx="8" fill="url(#blue)"/>
  <text x="610" y="387" font-family="sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">Envoyer ma demande</text>

  <!-- Google My Business badge -->
  <rect x="40" y="380" width="200" height="50" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="140" y="402" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle">⭐ 4.9/5 — 47 avis Google</text>
  <text x="140" y="420" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">Zone : Mulhouse · Colmar · Guebwiller</text>
</svg>
